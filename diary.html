<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易日記</title>
    <style>
	    body {
	      font-family: Arial, sans-serif;
	      padding: 20px;
	      max-width: 500px;
	      margin: auto;
	      background-color: #ffe6ff;
	    }
		.app-header {
		  background: #8080ff;
		  color: white;
		  display: flex;
		  align-items: center;        /* ← 縦中央 */
		  justify-content: space-between;
		  padding: 10px 14px;         /* ← 余白を最小限に */
		}

		.app-header h1 {
	  	  /* margin: 0;   */    /* ← これ超重要 */
  		  margin-left: 30px; /* ← 左に30pxの余白 */  
		  font-size: 18px;
		  font-weight: normal;
		}
		            
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            max-width: 600px;
            margin: auto;
            background-color: #cbe4e4;
        }

        h2 {
            font-size: 18px;
            color: blue;
        }
		.input-row {
		  display: flex;
		  flex-direction: column;
		  align-items: flex-start;
		  gap: 10px;              /* ← これを追加 */
		  margin-bottom: 10px;
		  width: 100%;
		}

        .input-row label, .input-row input, .input-row textarea, .input-row button {
            margin: 5px;
        }
        .input-row textarea {
            font-size: 16px;
            width: 95%;
            min-height: 150px;
            max-height: 300px;
	    	color: #2d2d2d    /* ← 黒を薄く */             
        }
        .input-row input {
            height: 30px;
            font-size: 16px;
        }
        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
			border-collapse: collapse; /* ← 重要 */            
        }
        th, td {
            border: 1px solid #ddd;
			padding: 6px 6px;   /* ← ここを詰める */
            text-align: left;
            word-wrap: break-word;
            white-space: pre-wrap;
    	    color: #2d2d2d    /* ← 黒を薄く */
        }
        th.date-column, td.date-column {
		    width: 20%;
		    max-width: 6ch;  /* 日付部分の幅を調整 */
		}
        th.content-column, td.content-column {
		    width: 50%;
		    max-width: 10ch; /* 日記内容の部分の幅を調整 */
		}
        th.actions-column, td.actions-column {
	    	width: 30%; /* 操作部分の幅を調整 */
    	    text-align: center;
		}
		td.actions-column button {
		    display: inline-block; /* インラインブロックで中央寄せ */
		}


        #diaryList {
            width: 100%;
        }
        button {
            font-size: 14px;
            padding: 3px 10px; /* ボタンの余白を調整 */
            background-color: #f7eeff; 
            color: black;
            border: 1px solid #0000ff;
            border-radius: 5px;            
            cursor: pointer;
            min-width: 80px;   /* 最小幅を設定 */
            display: inline-block; /* 横並びにする */
        }
        
		.nav-button {
		  min-width: 3em;
		  padding: 0.40em 0; /* ← 上下の余白を少し増やす */
		  text-align: center;
		  font-size: 15px;
		  line-height: 1.2;
		  white-space: nowrap;    /* 超重要 */
		}

		.nav-button2 {
		  min-width: 2.2em;
		  padding: 0.25em 0;
		  text-align: center;
		  font-size: 16px;        /* 記号は少し大きく */
		  line-height: 1.2;
		  white-space: nowrap;
		}   
		
		.save-button {
            /*padding: 3px 10px;*/
            background-color: #ffdbed;
            border-radius: 5px;
            cursor: pointer;            
        }

        .btn-show-text {  /* 3/15に */
            font-size: 14px;
            background-color: #ffe9d2;
            color: black;
            border: 1px solid #0000ff;
            border-radius: 5px;            
            cursor: pointer;
            min-width: 60px;   /* 最小幅を設定 */
            display: inline-block; /* 横並びにする */
        }
        
        #closeList {        	
            background-color: #acffd6;
        }
        
		#monthSelection {
		    display: flex;
		    gap: 10px; /* `input` と `button` の間に余白をつける */
		    align-items: center; /* 縦の中央揃え */
		}

        .custom-alert {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #ffcccb;
            color: black;
            padding: 10px 20px;
            border: 1px solid red;
            border-radius: 5px;
            font-size: 16px;
            z-index: 1000;
        }

		.date-row {
		  display: flex;
		  align-items: center;
		  gap: 4px;
		  flex-wrap: nowrap;
		  margin-bottom: 0; /* ← これがあると下に隙間ができる */		  
		}

		#date {
		  min-width: 120px;
		  max-width: 150px;
		  flex-shrink: 1;
		}
        
	    /* 戻るボタン 5/6 */
		.top-right-button {
		  width: auto;
		  min-width: 0;
		  padding: 4px 12px;
		  background-color: #e1ffff;
		  color: #400040;
		  border: 1px solid #ff8000;
		  border-radius: 20px;
		  font-size: 14px;
		  cursor: pointer;
		}
	    .top-right-button:hover {
	      background-color: #e3e3f0;
	    }
	
	    footer {
	      text-align: center;
	      padding: 12px;
	      font-size: 15px;	
	      color: #b87272;                
	    }	   

		.list-title {
	      color: #5c5c5c; 		
		  margin: 6px 0 6px;
		  font-weight: bold;
		}

		@media (max-width: 600px) {
		  th, td {
		    padding: 4px 4px;
		    font-size: 14.5px;
			line-height: 1.4;
		  }
		}

	  /* ◁▷ ナビボタンを押したときに一瞬強調 */
	  .nav-button2.active-direction {
	    background-color: #007bff;
	    color: white;
	  }

	  /* 今日ボタンの通常スタイル */
	  #todayButton {
	    color: gray;
	    background-color: transparent;
	    border: 1px solid gray;
	    transition: all 0.3s ease;
	  }

	  /* 今日ボタンが「今日の日付」と一致しているときの強調スタイル */
	  #todayButton.today-active {
	    background-color: #007bff;
	    color: white;
	    border: none;
	  }

	#diaryContent {
	  margin-top: -4px; /* ← 必要に応じて調整 */
	  margin-bottom: 0px; /* ← 必要に応じて調整 */	  
	}

	 /*.date-row {
	  border: 1px dashed red;
	}
	#diaryContent {
	  border: 1px dashed blue;
	}
	 */
	  
    </style>
</head>
<body>

	<header class="app-header">
	  <h1>📝 簡易日記 diary</h1>
		<button class="top-right-button" onclick="goBack()">戻る</button>
	</header>

	<script>
	function goBack() {
	  if (history.length > 1) {
	    history.back();
	  } else {
	    location.href = 'index.html';
	  }
	}
	</script>


    <div class="container">
    <div class="input-row">

      <!-- 日付操作行 -->
	<div class="date-row">
	  <button id="prevBtn" class="nav-button2" onclick="changeDate(-1)">◁</button>
	  <button id="todayButton" class="nav-button" onclick="setToday()">今日</button>
	  <button id="nextBtn" class="nav-button2" onclick="changeDate(1)">▷</button>

	  <input type="date" id="date">
	</div>

      <!-- 日記入力 -->
      <!-- <label for="diaryContent">日記:</label> -->
      <textarea id="diaryContent" rows="12"></textarea>

      <button class="save-button" onclick="saveDiary()">💾 保存</button>

    </div>

	<p class="list-title">日記を表示</p>

    <div id="monthSelection">
      <label for="monthInput">月を選択:</label>
      <input type="month" id="monthInput">
      <button onclick="showSelectedMonth()">表示</button>
    </div>

    <button id="closeList" onclick="closeDiaryList()" style="display:none;">リストを閉じる</button>
    <h2 id="selectedMonth" style="display:none;"></h2>
    <div id="diaryList" class="table-container" style="display:none;"></div>
  </div>

  <script>
    let displayedYear = new Date().getFullYear();
    let displayedMonth = new Date().getMonth() + 1;

    // 今日を YYYY-MM-DD で返す（JST基準）
    function getTodayStr() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }


	function loadDiaryByDate(dateStr) {
	  const key = `diary_${dateStr.replace(/-/g, '')}`;
	  const saved = localStorage.getItem(key);
	  document.getElementById('diaryContent').value = saved ? saved : '';
	}

	function updateTodayButtonStyle() {
	  const todayButton = document.getElementById('todayButton');
	  const dateInput = document.getElementById('date');
	  const todayStr = getTodayStr();

	  if (dateInput.value === todayStr) {
	    todayButton.classList.add('today-active');
	  } else {
	    todayButton.classList.remove('today-active');
	  }
	}

    // 今日をセット
	function setToday() {
	  const today = getTodayStr();
	  document.getElementById('date').value = today;
	  loadDiaryByDate(today);
	  updateTodayButtonStyle(); // ← 追加
	}

    // 前日・翌日へ移動
	function changeDate(diff) {
	  const dateInput = document.getElementById('date');
	  if (!dateInput.value) {
	    setToday();
	    return;
	  }
	  const d = new Date(dateInput.value);
	  d.setDate(d.getDate() + diff);

	  const y = d.getFullYear();
	  const m = String(d.getMonth() + 1).padStart(2, '0');
	  const day = String(d.getDate()).padStart(2, '0');
	  const newDate = `${y}-${m}-${day}`;

	  dateInput.value = newDate;
	  loadDiaryByDate(newDate);
	  updateTodayButtonStyle(); // ← 追加

	  // ◁▷ボタンの一時強調表示
	  const leftBtn = document.getElementById('prevBtn');
	  const rightBtn = document.getElementById('nextBtn');
	  const targetBtn = diff < 0 ? leftBtn : rightBtn;

	  if (targetBtn) {
	    targetBtn.classList.add('active-direction');
	    setTimeout(() => targetBtn.classList.remove('active-direction'), 200);
	  }
	}

    // 初期表示は今日
	window.addEventListener('DOMContentLoaded', () => {
	  setToday();
	  updateTodayButtonStyle(); // ← 追加
	});

    // カスタム通知
    function showCustomAlert(message) {
      const alertContainer = document.createElement('div');
      alertContainer.className = 'custom-alert';
      alertContainer.textContent = message;
      document.body.appendChild(alertContainer);
      setTimeout(() => {
        document.body.removeChild(alertContainer);
      }, 5000);
    }

    // 日付変更時 mm/dd を本文へ転送
	document.getElementById('date').addEventListener('change', function () {
	  const selectedDate = this.value;
	  if (!selectedDate) return;

	  loadDiaryByDate(selectedDate);
	  updateTodayButtonStyle(); // ← 追加

	  const mmdd = selectedDate.slice(5).replace('-', '/');
	  const diaryContent = document.getElementById('diaryContent');
	  if (!diaryContent.value.startsWith(mmdd)) {
	    diaryContent.value = mmdd + ' ' + diaryContent.value;
	  }
	});

    function saveDiary() {
      const date = document.getElementById('date').value;
      const diaryContent = document.getElementById('diaryContent').value.trim();
      if (!date) {
        showCustomAlert('日付を選択してください。');
        return;
      }
      if (diaryContent.length < 1) {
        showCustomAlert('日記内容を入力してください。');
        return;
      }
      const key = `diary_${date.replace(/-/g, '')}`;
      localStorage.setItem(key, diaryContent);
      alert('保存しました'); // カスタムアラートから変更 3/3
    }

    function showSelectedMonth() {
      const monthInput = document.getElementById('monthInput').value;
      if (!monthInput) {
        showCustomAlert('年月を選択してください。');
        return;
      }
      const [year, month] = monthInput.split('-').map(Number);
      displayedYear = year;
      displayedMonth = month;
      document.getElementById('selectedMonth').innerHTML = `<span>${year}年</span>${month}月`;
      document.getElementById('selectedMonth').style.display = 'block';
      document.getElementById('monthSelection').style.display = 'none';
      document.getElementById('closeList').style.display = 'block';
      displayDiaries(year, month);
    }

    function closeDiaryList() {
      document.getElementById('diaryList').style.display = 'none';
      document.getElementById('selectedMonth').style.display = 'none';
      document.getElementById('monthSelection').style.display = 'block';
      document.getElementById('closeList').style.display = 'none';
      clearDetailInputs();
    }

    function displayDiaries(year, month) {
      const keys = Object.keys(localStorage)
        .filter(key => key.startsWith('diary_'))
        .sort((a, b) => {
          const da = a.split('_')[1];
          const db = b.split('_')[1];
          return new Date(da.slice(0,4), da.slice(4,6)-1, da.slice(6,8))
               - new Date(db.slice(0,4), db.slice(4,6)-1, db.slice(6,8));
        });

      const diaryList = document.getElementById('diaryList');
      diaryList.innerHTML = '';

      const table = document.createElement('table');
      const headerRow = document.createElement('tr');
      ['日付','日記内容','操作'].forEach(t => {
        const th = document.createElement('th');
        th.textContent = t;
        headerRow.appendChild(th);
      });
      table.appendChild(headerRow);

      keys.forEach(key => {
        const date = key.split('_')[1];
        const diaryDate = new Date(date.slice(0,4), date.slice(4,6)-1, date.slice(6,8));
        if (diaryDate.getFullYear() === year && diaryDate.getMonth()+1 === month) {
          const row = document.createElement('tr');
          const dateCell = document.createElement('td');
          const contentCell = document.createElement('td');
          const actionsCell = document.createElement('td');
          dateCell.textContent = `${diaryDate.getFullYear()}-${String(diaryDate.getMonth()+1).padStart(2,'0')}-${String(diaryDate.getDate()).padStart(2,'0')}`;
          contentCell.textContent = localStorage.getItem(key).substring(0,40) + '...';
          const viewButton = document.createElement('button');
          viewButton.textContent = '表示';
          viewButton.className = 'btn-show-text';
          viewButton.onclick = () => {
            document.getElementById('date').value = dateCell.textContent;
            document.getElementById('diaryContent').value = localStorage.getItem(key);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };
          actionsCell.appendChild(viewButton);
          row.appendChild(dateCell);
          row.appendChild(contentCell);
          row.appendChild(actionsCell);
          table.appendChild(row);
        }
      });

      diaryList.appendChild(table);
      diaryList.style.display = 'block';
    }

    function clearDetailInputs() {
      document.getElementById('date').value = '';
      document.getElementById('diaryContent').value = '';
    }
  </script>

	    <button class="top-button" id="topBtn" onclick="scrollToTop()">Top</button>
		<button class="bottom-button" id="bottomBtn" onclick="scrollToBottom()">Bottom</button>
	    

  <script>
	    // ==========================================================
	    // ★ スクロールボタン制御 (Top/Bottom)
	    // ==========================================================

	    function scrollToTop() {
	      window.scrollTo({ top: 0, behavior: 'smooth' });
	    }

	    function scrollToBottom() {
	      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
	    }

	    function hideScrollButtons() {
	        document.getElementById("topBtn").style.display = "none";
	        document.getElementById("bottomBtn").style.display = "none";
	    }

		// ==========================================================
		// ★ スクロールボタン制御の修正版 (Top/Bottom 独立制御) 12/02
		// ==========================================================
		function showScrollButtonsIfPageLong() {
		    const topBtn = document.getElementById("topBtn");
		    const bottomBtn = document.getElementById("bottomBtn");
		    
		    const docHeight = document.body.scrollHeight;
		    const viewHeight = window.innerHeight;
		    const scrollY = window.scrollY;
		    
		    const scrollThreshold = 100; // ボタンが表示されるしきい値 (px)
		    
		    // ページがスクロール可能でなければ両方非表示
		    if (docHeight <= viewHeight + scrollThreshold) {
		        topBtn.style.display = "none";
		        bottomBtn.style.display = "none";
		        return;
		    }

		    // --- Topボタンの表示制御 ---
		    // 100px以上スクロールしたらTopボタンを表示
		    if (scrollY > scrollThreshold) {
		        topBtn.style.display = "block";
		    } else {
		        topBtn.style.display = "none";
		    }

			// --- Bottomボタンの表示制御 ---
			// 100px以上スクロール かつ 下端まで余裕がある場合のみ表示
			if (
			    scrollY > scrollThreshold &&
			    docHeight - viewHeight - scrollY > scrollThreshold
			) {
			    bottomBtn.style.display = "block";
			} else {
			    bottomBtn.style.display = "none";
			}
		}

	    // スクロール時のボタン表示制御
	    window.addEventListener("scroll", showScrollButtonsIfPageLong);
	    
	    // 初期ロード時にもボタン表示をチェック
	    window.addEventListener("load", showScrollButtonsIfPageLong);
	    
	    // 画面サイズ変更時にもチェック (スマホの向き変更など)
	    window.addEventListener("resize", showScrollButtonsIfPageLong);


	    // ==========================================================
	    // ★ 初期化
	    // ==========================================================
	    // 初期化処理はDOMContentLoadedが完了したタイミングで実行される
	    document.addEventListener('DOMContentLoaded', () => {
	        showScrollButtonsIfPageLong();
	    });
	    
  </script>
  
  <footer>
  © 20260303 ettomio - 舞いカレンダー
  </footer>
  <div style="height: 50px;"></div>
  
  </body>
</html>
