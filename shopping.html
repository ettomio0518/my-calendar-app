            color: white;
            border: none;

    .calc-float-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #a74fff;

        border-radius: 20px;
        font-size: 16px;

        opacity: 1;

    .modal {
        display: none;

        z-index: 99999;

        top: 0;

        background: rgba(0,0,0,0.4);
    }

<body>
  <div class="app">
    <header class="app-header">

        onclick="window.location.href='index.html'">戻る</button>

<button id="ai-button" class="blinking" onclick="announceCompass()">

<section>
<h2>🏷 割引計算</h2>    
        <div class="discount-row">

                <th>単価</th>

<div id="ai-interaction-container" style="display:none;">
    <p style="margin: 0 0 8px 0; font-weight: bold; color: #333; font-size: 0.85em;">💬 AI秘書（お買い物計算）：</p>
    <div style="display: flex; gap: 5px; align-items: center;">
        <input type="text" id="ai-user-input" placeholder="例：3980円の3割引、税10%を覚えて" style="border-radius: 10px; border: 1px solid #ccc;">
        <div id="ai-button-group" style="display: flex; gap: 5px;">
            <button onclick="startAiVoiceInput()" style="background: #f0f0f0; border: 1px solid #ccc; border-radius: 10px;">🎤</button>
            <button onclick="handleAiChat()" style="background: #5daab0; color: white; border: none; border-radius: 10px; font-weight: bold;">送信</button>
        </div>
    </div>
    <div id="ai-chat-history" style="display: none;"></div>
</div>

      
    <script>
        let itemIndex = 0;

        function addItemRow() {
            if (itemIndex >= 20) {
            showCustomAlert("申し訳ございません。計算はここまでです。");
            nativeSpeak("申し訳ございません。計算はここまでです。");            
                return;
            }
            
            const table = document.getElementById('itemTable');
            const row = table.insertRow(-1);
            row.innerHTML = `
                <td><input type="number" id="price${itemIndex}" onchange="updateSubtotal(${itemIndex});checkAndAddRow(${itemIndex})"></td>
                <td><input type="text" id="quantity${itemIndex}" value="1" onclick="increaseQuantity(${itemIndex})" onchange="updateSubtotal(${itemIndex})"></td>
                <td>
                    <button class="tax-button" onclick="setTaxRate(${itemIndex}, 8)">8</button>
                    <button class="tax-button" onclick="setTaxRate(${itemIndex}, 10)">10</button>
                </td>
                <td><button onclick="clearRow(${itemIndex})">消去</button></td>
                <td><input type="text" id="subtotal${itemIndex}" readonly></td>
            `;
            itemIndex++;
        }

        function checkAndAddRow(index) {
            const price = document.getElementById(`price${index}`).value;
            if (price && itemIndex - 1 === index) {
                addItemRow();
            }
        }

        function setTaxRate(index, taxRate) {
            const buttons = document.querySelectorAll(`#itemTable tr:nth-child(${index + 2}) .tax-button`);
            buttons.forEach(button => button.classList.remove('active'));
            
            const activeButton = Array.from(buttons).find(button => button.textContent.includes(taxRate));
            if (activeButton) activeButton.classList.add('active');
            
            document.getElementById(`price${index}`).setAttribute("data-tax-rate", taxRate);
            updateSubtotal(index);
        }

        function updateSubtotal(index) {
            const price = parseFloat(document.getElementById(`price${index}`).value) || 0;
            const quantity = parseInt(document.getElementById(`quantity${index}`).value) || 0;
            const taxRate = parseFloat(document.getElementById(`price${index}`).getAttribute("data-tax-rate")) || 0;
            const subtotal = (price * quantity) * (1 + taxRate / 100);
            document.getElementById(`subtotal${index}`).value = subtotal.toFixed(2);
        }

        function clearRow(index) {
            document.getElementById(`price${index}`).value = '';
            document.getElementById(`quantity${index}`).value = '1';
            document.getElementById(`subtotal${index}`).value = '';
            setTaxRate(index, 8);
        }

        function increaseQuantity(index) {
            const quantityInput = document.getElementById(`quantity${index}`);
            let quantity = parseInt(quantityInput.value) || 0;
            quantity++;
            quantityInput.value = quantity;
            updateSubtotal(index);
        }

        function calculateTotal() {
            let total = 0;
            let totalBasePrice = 0;
            for (let i = 0; i < itemIndex; i++) {
                const price = parseFloat(document.getElementById(`price${i}`).value) || 0;
                const quantity = parseInt(document.getElementById(`quantity${i}`).value) || 0;
                const subtotal = parseFloat(document.getElementById(`subtotal${i}`).value) || 0;
                totalBasePrice += price * quantity;
                total += subtotal;
            }
            totalBasePrice = Math.round(totalBasePrice * 100) / 100;
            total = Math.round(total * 100) / 100;
            document.getElementById('totalPrice').innerHTML =
  `定価合計は${totalBasePrice}円、<strong>税込み合計は${total.toFixed(2)}円です。</strong>`;
            document.getElementById('extraFields').style.display = 'block';
            const message =(`定価合計は${totalBasePrice}円、税込み合計は${total.toFixed(2)}円です。若干の誤差が生じるかもしれません。`);
            showCustomAlert(message);
            nativeSpeak(message);
        }
                    
        function updateDiscountedPrice() {
            const price = parseFloat(document.getElementById('discountPrice').value) || 0;
            const discountRate = parseFloat(document.getElementById('discountRate').value) || 0;
            const discountedPrice = price * (1 - discountRate / 100);
            document.getElementById('discountedPrice').value = discountedPrice.toFixed(2);
        }

        function transferDiscount() {
            if (itemIndex >= 20) {
                showCustomAlert("申し訳ございません。計算はここまでです。");
                nativeSpeak("申し訳ございません。計算はここまでです。");
                return;
            }
            const discountedPrice = parseFloat(document.getElementById('discountedPrice').value) || 0;
            let emptyRowIndex = -1;
            for (let i = 0; i < itemIndex; i++) {
                const priceCell = document.getElementById(`price${i}`);
                if (priceCell && !priceCell.value) {
                    emptyRowIndex = i;
                    break;
                }
            }
            if (emptyRowIndex === -1) {
                addItemRow();
                emptyRowIndex = itemIndex - 1;
            }
            document.getElementById(`price${emptyRowIndex}`).value = discountedPrice.toFixed(2);
            updateSubtotal(emptyRowIndex);
            checkAndAddRow(emptyRowIndex);
            clearDiscount();
        }
        
        function clearDiscount() {
            document.getElementById('discountPrice').value = '';
            document.getElementById('discountRate').value = '';
            document.getElementById('discountedPrice').value = '';
        }

        function showAlert() {
            const alertMessage = document.getElementById('alertMessage');
            alertMessage.style.display = 'block';
            setTimeout(() => {
                alertMessage.style.display = 'none';
            }, 5000);
        }

        function saveTotalAmount() {
            const date = document.getElementById('purchaseDate').value;
            const totalAmount = document.getElementById('totalAmount').value;
            if (date && totalAmount) {
                localStorage.setItem(`shopping_${date.replace(/-/g, '')}`, totalAmount);
                alert('合計金額が保存されました');
            } else {
                alert('日付と合計金額を入力してください');
            }
        }

// ==========================================
// 🧭 AI羅針盤：お買い物・完全起動版
// ==========================================
const AI_HISTORY_KEY = 'shopping_chat_history';

// 1. 起動スイッチ（表示とスクロール）
function announceCompass() {
    const chatContainer = document.getElementById('ai-interaction-container');
    if (chatContainer) {
        chatContainer.style.display = 'block';
        // 最下段の交信窓口へスムーズにスクロール
        chatContainer.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
    
    const msg = "お買い物の記憶と計算、うけたまわります。何から覚えましょうか？";
    nativeSpeak(msg);
    
    const inputField = document.getElementById('ai-user-input');
    if (inputField) inputField.focus();
}

// 2. 履歴管理（忘れないための処理）
function getChatHistory() {
    const history = localStorage.getItem(AI_HISTORY_KEY);
    return history ? JSON.parse(history) : [];
}

function saveChatHistory(history) {
    if (history.length > 20) history = history.slice(-20); // 直近10往復
    localStorage.setItem(AI_HISTORY_KEY, JSON.stringify(history));
}

// 3. 通信ロジック（能書き排除・履歴参照）
async function runDialogueCompass(userMessage) {
    nativeSpeak("考え中です。");
    const apiKey = localStorage.getItem("gemini_api_key"); 
    if (!apiKey) {
        const msg = "まずは、AI秘書の鍵を開けてください。";
        nativeSpeak(msg);
        alert(msg);
        return;
    }

    let history = getChatHistory();
    history.push({ role: "user", parts: [{ text: userMessage }] });

    const systemPrompt = `あなたは無口な計算マシンです。
【鉄の掟】
1. 挨拶、前置き、計算過程、解説は【永久に禁止】。
2. 追加時：「（商品名）を追加。合計（金額）円。」と短く即答せよ。
3. 税率：食料8%、他10%で自動計算（指定優先）。
4. 履歴を読み、過去の商品との合算を維持せよ。
5. 会計時：合計金額のみ提示せよ。
6. 記号（*や#）は含めない。`;

    try {
        const modelName = "gemini-3-flash-preview"; 
        const url = "https://generativelanguage.googleapis.com/v1beta/models/" + modelName + ":generateContent?key=" + apiKey;

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: systemPrompt }] }, ...history] })
        });

        const data = await response.json();
        let aiResponse = data.candidates[0].content.parts[0].text.replace(/[*#]/g, '').trim();

        // 履歴保存
        history.push({ role: "model", parts: [{ text: aiResponse }] });
        saveChatHistory(history);

        const historyArea = document.getElementById('ai-chat-history');
        if (historyArea) {
            historyArea.style.display = 'block';
            historyArea.innerText = aiResponse;
            historyArea.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
        nativeSpeak(aiResponse);

    } catch (error) {
        nativeSpeak("通信エラーです。");
    }
}

// 4. 送信処理
function handleAiChat() {
    const inputField = document.getElementById('ai-user-input');
    const message = inputField.value.trim();
    if (message) {
        runDialogueCompass(message);
        inputField.value = ""; 
    }
}

// 5. 音声入力（割り込み防止：確定まで待つ）
function startAiVoiceInput() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert("音声入力非対応です。");
        return;
    }
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'ja-JP';
    recognition.interimResults = false; // 途中の言葉で勝手に送信しない
    recognition.continuous = false;

    recognition.start();

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById('ai-user-input').value = transcript;
        handleAiChat(); // 確定したら送信
    };
}


        function handleAiChat() {
            const inputField = document.getElementById('ai-user-input');
            const message = inputField.value.trim();
            if (message) {
                runDialogueCompass(message);
                inputField.value = ""; 
            }
        }

        function startAiVoiceInput() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ja-JP';
            recognition.start();
            recognition.onresult = (event) => {
                document.getElementById('ai-user-input').value = event.results[0][0].transcript;
                handleAiChat(); 
            };
        }

        // 背景色の設定と初期化
        window.onload = function() {
            addItemRow();
            // GitHub (Web版) かどうかの判定
            if (window.location.hostname.includes("github.io")) {
                document.body.classList.add("github-version");
            }
        };
        
        function showCustomAlert(message) {
            const alertContainer = document.createElement('div');
            alertContainer.className = 'custom-alert';
            alertContainer.textContent = message;
            document.body.appendChild(alertContainer);
            setTimeout(() => {
                if (alertContainer.parentNode) document.body.removeChild(alertContainer);
            }, 5000);
        }

        function speakText(text) {
           if ('speechSynthesis' in window) {
               const utterance = new SpeechSynthesisUtterance(text);
               utterance.lang = "ja-JP";
               window.speechSynthesis.speak(utterance);
           }
        }

        function nativeSpeak(text) {
           if (typeof Android !== 'undefined' && Android.speak) {
               Android.speak(text);
           } else {
               speakText(text);
           }
        }

        function calculatePrice() {
            const ricePrice = parseFloat(document.getElementById("ricePrice").value);
            if (isNaN(ricePrice) || ricePrice <= 0) {
                alert("正しい価格を入力してください");
                return;
            }
            const totalServings = 5000 / 65;
            const pricePerServing = ricePrice / totalServings;
            const roundedPrice = Math.floor(pricePerServing);
            const roundedPrice2 = Math.round(pricePerServing * 10) / 10;
            const message2 = `あなたのご飯一膳はほぼ${roundedPrice}円になります`;
            showCustomAlert(message2);
            nativeSpeak(message2);
            document.getElementById("result").textContent = `一膳の価格: ${roundedPrice2} 円`;
        }           
    </script>

    <button class="top-button" id="topBtn" onclick="scrollToTop()">Top</button>
    <button class="bottom-button" id="bottomBtn" onclick="scrollToBottom()">Bottom</button>
        

 <script>
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function scrollToBottom() {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
    function showScrollButtonsIfPageLong() {
        const topBtn = document.getElementById("topBtn");
        const bottomBtn = document.getElementById("bottomBtn");
        const docHeight = document.body.scrollHeight;
        const viewHeight = window.innerHeight;
        const scrollY = window.scrollY;
        const scrollThreshold = 100;
        if (docHeight <= viewHeight + scrollThreshold) {
            topBtn.style.display = "none";
            bottomBtn.style.display = "none";
            return;
        }
        topBtn.style.display = (scrollY > scrollThreshold) ? "block" : "none";
        bottomBtn.style.display = (scrollY > scrollThreshold && docHeight - viewHeight - scrollY > scrollThreshold) ? "block" : "none";
    }
    window.addEventListener("scroll", showScrollButtonsIfPageLong);
    window.addEventListener("load", showScrollButtonsIfPageLong);
