<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>和風・度量衡コンバーター</title>

<style>
/* ===============================
   和風テーマ・全体設定
   =============================== */
body {
    font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
    background: #bed7da; /* 浅葱色（あさぎいろ） */
    margin: 0;
    padding: 0;
    color: #0000aa; /* 落ち着いた紺色 */
}

/* GitHub版（Web版）の背景色 */
body.github-version {
    background: #e1e1c4;
}

/* ===============================
   ヘッダー
   =============================== */
.wf-header {
    background: #649fa4; /* 濃い浅葱色 */
    padding: 15px 20px;
    position: relative;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

.wf-title {
    margin: 0;
    padding-left: 10px; /* ← 和風の余白 */
    font-size: 20px;
    color: #fff;
    letter-spacing: 2px;
}

.wf-back-button {
    position: absolute;
    right: 15px;
    top: 12px;
    padding: 4px 12px;
    font-size: 14px;
    border: none;
    border-radius: 20px;
    background: #ccffff;
    color: #333;
    cursor: pointer;
    transition: 0.2s;
}

.wf-back-button:hover {
    background: #fff;
}

/* ===============================
   カード（和紙風）
   =============================== */
.wf-card {
    background: #fffffc; /* 胡粉色（ごふんいろ） */
    margin: 20px;
    border-radius: 10px;
    border: 1px solid #e6e2d3;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    overflow: hidden;
}

/* 折りたたみボタン */
.wf-card-toggle {
    width: 100%;
    text-align: left;
    padding: 14px 16px;
    font-size: 18px;
    background: #f3f1eb;
    border: none;
    cursor: pointer;
    color: #0f4c81; /* 藍色 */
    border-bottom: 1px solid #e6e2d3;
    transition: background 0.2s;
}

.wf-card-toggle:hover {
    background: #e8e5dd;
}

/* 折りたたみ内容 */
.wf-card-content {
    padding: 15px;
    display: none; /* JSで制御 */
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ===============================
   入力・選択エリア
   =============================== */
.wf-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 5px;
}

input, select {
    padding: 10px;
    font-size: 16px;
    border-radius: 6px;
    border: 1px solid #c8c2b4;
    background: #fdfcf7;
    flex: 1;
    min-width: 120px;
}

/* 単位の注釈（alertの代わり） */
.wf-unit-note {
    font-size: 13px;
    color: #555;
    margin-bottom: 15px;
    min-height: 1.2em;
    padding-left: 8px;
    border-left: 3px solid #649fa4;
}

/* ご破算ボタン */
.wf-btn-clear {
    padding: 6px 20px;
    background: #f8b500; /* 山吹色 */
    color: #333;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

.wf-btn-clear:hover {
    background: #ffcc33;
}

/* ===============================
   結果表示テーブル
   =============================== */
.wf-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

.wf-table th, .wf-table td {
    padding: 10px;
    border-bottom: 1px solid #e6e2d3;
    text-align: left;
}

.wf-table th {
    background: #f3f1eb;
    color: #0f4c81;
}

/* 1/31 追加 */
.unit-code { 
	font-size: 12px; 
	color: #666; 
	margin-left: 4px; 
}

/* ===============================
   フッター
   =============================== */
footer {
    text-align: center;
    padding: 0px;
    font-size: 14px;
}

.spacer {
    height: 50px;
}

.calc-float-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #a74fff;
    color: white;
    padding: 10px 16px;
    border-radius: 20px;
    font-size: 16px;
    text-decoration: none;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    z-index: 9999;

    opacity: 0;              /* 最初は透明 */
    transition: opacity 0.6s ease;  /* ふわっと表示 */
}
.calc-float-btn.visible {
    opacity: 0.85;           /* 半透明で存在感を抑える 0.75から0.85に変更 */
}
.calc-float-btn:hover {
    opacity: 1;              /* ホバー時だけ100%表示 */
    background: #0056b3;
}

#ai-button {
    font-size: 15px;
    padding: 2px 10px;
    color: #00ffff; 
    background-color: #5b5b5b; 
    border-radius: 5px;	
    margin-top: 15px;
    margin-left: 35px; 		 	    
}

.blinking {
    animation: blink 1.0s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0; }
    100% { opacity: 1; }
}

/* AI羅針盤（スマホ横幅最適化） */
@media screen and (max-width: 480px) {
    #ai-interaction-container {
        margin: 10px; /* 外側の余白を最小限に */
        padding: 10px; /* 内側の余白を詰める */
    }

    /* フレックスコンテナの調整 */
    #ai-interaction-container > div {
        display: flex;
        align-items: center; /* 垂直方向を中央に */
        gap: 5px; /* 要素間の隙間を最小限に */
    }

    /* 入力欄：他の要素の幅を引いた残り全幅を使う */
    #ai-user-input {
        flex: 1; 
        min-width: 0; /* 横幅が突き抜けるのを防ぐ */
        padding: 8px;
        font-size: 14px;
    }

    /* ボタン類：幅を固定せず内容に合わせる */
    #ai-button-group {
        display: flex;
        gap: 5px;
        flex-shrink: 0; /* ボタンが潰れないように固定 */
    }

    #ai-button-group button {
        padding: 8px 10px;
        font-size: 14px;
        white-space: nowrap; /* テキストの改行を防ぐ */
    }
}
	
</style>
</head>

<body>

<header class="wf-header">
    <h1 class="wf-title">📐 和風・度量衡コンバーター</h1>
    <button class="wf-back-button" onclick="location.href='index.html'">戻る</button>
</header>

<button id="ai-button" class="blinking" onclick="announceCompass()">
    🧭 AI羅針盤
</button>

<main id="converter-root">
    </main>

<div id="ai-interaction-container" style="display:none;">
    <p style="margin: 0 0 8px 0; font-weight: bold; color: #333; font-size: 0.85em;">💬 AI秘書へのメッセージ：</p>
    <div style="display: flex; gap: 5px; align-items: center;">
        <input type="text" id="ai-user-input" placeholder="何かお手伝いしますか？" style="border-radius: 10px; border: 1px solid #ccc;">
        <div id="ai-button-group" style="display: flex; gap: 5px;">
            <button onclick="startAiVoiceInput()" style="background: #f0f0f0; border: 1px solid #ccc; border-radius: 10px;">🎤</button>
            <button onclick="handleAiChat()" style="background: #5daab0; color: white; border: none; border-radius: 10px; font-weight: bold;">送信</button>
        </div>
    </div>
    <div id="ai-chat-history" style="display: none;"></div>
</div>

<script>
/* ===============================
   単位データと定義
   =============================== */
// 1坪の正確な定義（400/121 平方メートル）
const TSUBO_TO_M2 = 3.305785123966942;

const UNIT_TABLE = {
    length: {
        name: "長さの換算",
        units: { m: 1, km: 1000, inch: 0.0254, foot: 0.3048, yard: 0.9144, mile: 1609.344, sun: 0.030303, shaku: 0.30303, nautical: 1852 },
        labels: { m: "メートル", km: "キロメートル", inch: "インチ", foot: "フィート", yard: "ヤード", mile: "マイル", sun: "寸", shaku: "尺", nautical: "海里" },
        tips: { sun: "1寸 = 約3.03cm", shaku: "1尺 = 約30.3cm", nautical: "1海里 = 1852m" }
    },
    area: {
        name: "面積の換算",
        units: { 
            m2: 1, a: 100, ha: 10000, km2: 1000000, yd2: 0.836127, ac: 4046.856, 
            tsubo: TSUBO_TO_M2, 
            han: TSUBO_TO_M2 * 300, 
            cho: TSUBO_TO_M2 * 3000 
        },
        labels: { m2: "平方メートル", a: "アール", ha: "ヘクタール", km2: "平方キロ", yd2: "平方ヤード", ac: "エーカー", tsubo: "坪", han: "反", cho: "町" },
        tips: { tsubo: "1坪 = 約3.31㎡", han: "1反 = 300坪", cho: "1町 = 10反" }
    },
    volume: {
        name: "容積の換算",
        units: { ml: 1, l: 1000, dl: 100, m3: 1000000, gallon: 3785.41, shaku: 18.039, go: 180.39, sho: 1803.9, to: 18039 },
        labels: { ml: "ミリリットル", l: "リットル", dl: "デシリットル", m3: "立方メートル", gallon: "ガロン", shaku: "勺", go: "合", sho: "升", to: "斗" },
        tips: { go: "1合 = 約180ml", sho: "1升 = 10合", to: "1斗 = 10升" }
    },
    weight: {
        name: "重量の換算",
        units: { mg: 1, g: 1000, kg: 1000000, ton: 1000000000, carat: 200, ounce: 28349.5, pound: 453592, kan: 3750000 },
        labels: { mg: "ミリグラム", g: "グラム", kg: "キログラム", ton: "トン", carat: "カラット", ounce: "オンス", pound: "ポンド", kan: "貫" },
        tips: { kan: "1貫 = 3.75kg" }
    },
    temperature: {
        name: "温度の換算",
        labels: { K: "ケルビン", C: "摂氏（℃）", F: "華氏（℉）" },
        tips: { K: "絶対零度は 0K", C: "水が凍るのは 0℃", F: "水が凍るのは 32℉" }
    },
    pressure: {
        name: "圧力の換算",
        units: { Pa: 1, hPa: 100, mmHg: 133.322, atm: 101325 },
        labels: { Pa: "パスカル", hPa: "ヘクトパスカル", mmHg: "水銀柱(mmHg)", atm: "標準大気圧" },
        tips: { hPa: "1hPa = 100Pa", atm: "1気圧 = 1013.25hPa" }
	},
    
    /* ▼▼▼ ここから速度の換算を追加 ▼▼▼ */
    speed: {
        name: "速度の換算",
        units: {
            ms: 1,                 // m/s
            mmin: 1/60,            // m/min
            kmh: 1000/3600,        // km/h
            fts: 0.3048,           // ft/s
            ftmin: 0.3048/60,      // ft/min
            mph: 1609.344/3600,    // mile/h
            kt: 0.514444,          // knot
            mach: 340.29           // Mach（海面基準）
        },
        labels: {
            ms: "メートル毎秒",
            mmin: "メートル毎分",
            kmh: "キロメートル毎時",
            fts: "フィート毎秒",
            ftmin: "フィート毎分",
            mph: "マイル毎時",
            kt: "ノット",
            mach: "マッハ"
        },
        tips: {
            kt: "1ノット = 1海里/時 = 約0.514m/s",
            mach: "マッハは海面基準で約340m/s"
        }
    }
};

/* ===============================
   HTML生成・初期化
   ============================== */
const root = document.getElementById('converter-root');

for (const key in UNIT_TABLE) {
    const category = UNIT_TABLE[key];
    const section = document.createElement('section');
    section.className = 'wf-card';
    section.innerHTML = `
        <button class="wf-card-toggle" data-target="${key}-content">${category.name}</button>
        <div id="${key}-content" class="wf-card-content">
            <div class="wf-row">
                <input type="number" id="${key}-value" placeholder="数値を入力" oninput="runConvert('${key}')">
                <select id="${key}-unit" onchange="runConvert('${key}')"></select>
            </div>
            <div id="${key}-tip" class="wf-unit-note"></div>
            <button class="wf-btn-clear" onclick="clearFields('${key}')">ご破算</button>
            <table class="wf-table">
                <thead><tr><th>単位</th><th>結果</th></tr></thead>
                <tbody id="${key}-results"></tbody>
            </table>
        </div>
    `;
    root.appendChild(section);

	// セレクトボックスの選択肢を追加
	const select = document.getElementById(`${key}-unit`);
	for (const unitKey in category.labels) {
	    const option = document.createElement('option');
	    option.value = unitKey;
	    option.textContent = `${category.labels[unitKey]} (${unitKey})`;
	    select.appendChild(option);
	}
}

/* ===============================
   計算・制御ロジック
   ============================== */

// 換算実行
function runConvert(categoryKey) {
    const valInput = document.getElementById(`${categoryKey}-value`);
    const unitSelect = document.getElementById(`${categoryKey}-unit`);
    const tipArea = document.getElementById(`${categoryKey}-tip`);
    const tbody = document.getElementById(`${categoryKey}-results`);
    
    const value = parseFloat(valInput.value);
    const unit = unitSelect.value;

    // 注釈の更新
    tipArea.textContent = UNIT_TABLE[categoryKey].tips?.[unit] || "";

    if (isNaN(value)) {
        tbody.innerHTML = "";
        return;
    }

    let results = {};
    if (categoryKey === "temperature") {
        results = calcTemp(value, unit);
    } else {
        const units = UNIT_TABLE[categoryKey].units;
        const base = value * units[unit];
        for (const k in units) {
            let res = base / units[k];
            // 浮動小数点誤差の補正（299.999...問題を解消）
            results[k] = Math.abs(res - Math.round(res)) < 1e-9 ? Math.round(res) : res.toFixed(6);
        }
    }

    const labels = UNIT_TABLE[categoryKey].labels;
    tbody.innerHTML = Object.entries(results) 
    	.map(([u, v]) => 
    		`<tr> <td>${labels[u]} <span class="unit-code">(${u})</span>
    		</td> <td>${Number(v).toLocaleString(undefined, {maximumFractionDigits:6})}</td> 
		</tr>` ) 
		.join("");
	}

// 温度専用計算
function calcTemp(v, u) {
    let k, c, f;
    if (u === "K") { k = v; c = v - 273.15; f = c * 9/5 + 32; }
    else if (u === "C") { c = v; k = v + 273.15; f = v * 9/5 + 32; }
    else { f = v; c = (v - 32) * 5/9; k = c + 273.15; }
    return { K: k.toFixed(2), C: c.toFixed(2), F: f.toFixed(2) };
}

// ご破算（クリア）
function clearFields(key) {
    document.getElementById(`${key}-value`).value = "";
    document.getElementById(`${key}-results`).innerHTML = "";
    document.getElementById(`${key}-tip`).textContent = "";
}

// 折りたたみイベント
document.addEventListener("click", (e) => {
    if (e.target.classList.contains("wf-card-toggle")) {
        const targetId = e.target.dataset.target;
        const content = document.getElementById(targetId);
        const isVisible = content.style.display === "block";
        content.style.display = isVisible ? "none" : "block";
    }
});

// 初期状態：長さのカードだけ開いておく
document.getElementById("length-content").style.display = "block";


function showCalcButtonOnScroll() {
    const btn = document.querySelector(".calc-float-btn");
    const scrollY = window.scrollY;

    if (scrollY > 1) {   // ← ここを 50を1 に変更
        btn.classList.add("visible");
    } else {
        btn.classList.remove("visible");
    }
}

window.addEventListener("scroll", showCalcButtonOnScroll);
window.addEventListener("load", showCalcButtonOnScroll);

</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const isGitHub = window.location.hostname.includes('github.io');
    const isAndroidApp = window.location.href.includes("android_asset");
    const aiBtn = document.getElementById("ai-button");

    // 1. 背景色の切り替え（GitHub版）
    if (isGitHub) {
        document.body.classList.add('github-version');
    }

    // 2. AI羅針盤ボタンの表示制御
    if (aiBtn) {
        if (isAndroidApp) {
            aiBtn.style.display = "none"; // アプリ版は非表示
        } else {
            aiBtn.style.display = "inline-block"; // Web版・ローカル版は表示
        }
    }

    // 3. URLパラメータ（?mode=ai）の処理
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('mode') === 'ai') {
        const container = document.getElementById('ai-interaction-container');
        if (container) {
            container.style.display = 'block';
            container.scrollIntoView({ behavior: 'smooth' });
        }
    }
});

function announceCompass() {
    const container = document.getElementById('ai-interaction-container');
    if (!container) return;

    // ローカル版でも確認なしでそのまま表示を切り替える（GitHub版と同様の動作）
    if (container.style.display === 'none' || container.style.display === '') {
        container.style.display = 'block';
        container.scrollIntoView({ behavior: 'smooth' });
    } else {
        container.style.display = 'none';
    }
}

// 音声入力用（枠組みのみ）
function startAiVoiceInput() {
    console.log("音声入力を開始します");
}

// 送信用（枠組みのみ）
function handleAiChat() {
    const input = document.getElementById('ai-user-input');
    const history = document.getElementById('ai-chat-history');
    if (input && input.value.trim() !== "") {
        history.style.display = 'block';
        history.innerHTML += `<div>👤: ${input.value}</div>`;
        input.value = "";
    }
}

</script>


<script>
// ==========================================
// 3. AI羅針盤の実行（通信）ロジック：度量衡版
// ==========================================
const AI_HISTORY_KEY = 'gemini_doryoko_history';

// 起動時の挨拶とスクロール
function announceCompass() {
    const chatContainer = document.getElementById('ai-interaction-container');
    if (chatContainer) {
        chatContainer.style.display = 'block';
        // 最下段へスクロール
        chatContainer.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
    
    const msg = "何かお手伝いしましょうか？";
    speakText(msg);
    
    // 入力欄にフォーカスを当てる
    const inputField = document.getElementById('ai-user-input');
    if (inputField) inputField.focus();
}

// 音声出力（度量衡用：nativeSpeakがない場合を考慮）
function speakText(text) {
    if (typeof nativeSpeak === 'function') {
        nativeSpeak(text);
    } else {
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = "ja-JP";
        window.speechSynthesis.speak(uttr);
    }
}

async function runDialogueCompass(userMessage) {
    speakText("考え中です。");

    const apiKey = localStorage.getItem("gemini_api_key"); 

    if (!apiKey) {
        const msg = "まずは、AI秘書の鍵を開けてください。";
        speakText(msg);
        alert(msg);
        return;
    }

    const chatContainer = document.getElementById('ai-interaction-container');
    if (chatContainer) {
        chatContainer.style.display = 'block';
    }

    const systemPrompt = `あなたは度量衡（単位換算・計算）の専門家です。
【鉄の掟】
1. 挨拶、前置き、案内は【永久に禁止】。記号（**や##）は含めない。
2. ユーザーの質問に対し：
   - 「です・ます」調の丁寧な日本語で答えよ。
   - 度量衡、単位換算、物理計算の質問（例：ノットから日数、エーカーから反など）には、論理的かつ正確に即答せよ。
   - 六曜、行事、予定、天気の質問をされたら「データを備えておりません。今日のカード（ https://ettomio0518.github.io/my-calendar-app/today-card.html ）ではお答えできるかもしれません。」と回答せよ。
   - それ以外の一般質問には、AIとしての知識で誠実に答えよ。
3. 数値は分かりやすく、必要に応じて計算過程も簡潔に示せ。`;

    try {
        const modelName = "gemini-3-flash-preview"; 
        const url = "https://generativelanguage.googleapis.com/v1beta/models/" + modelName + ":generateContent?key=" + apiKey;

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: systemPrompt + (userMessage || "") }] }] })
        });

        const data = await response.json();
        let aiResponse = data.candidates[0].content.parts[0].text.replace(/[*#]/g, '');

        const historyArea = document.getElementById('ai-chat-history');
        if (historyArea) {
            historyArea.style.display = 'block';
            historyArea.innerText = aiResponse;
            // 回答表示後も最下段を維持
            historyArea.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
        speakText(aiResponse);

    } catch (error) {
        console.error("APIエラー:", error);
        speakText("通信に失敗しました。");
    }
}

// 送信ボタンが押された時の処理
function handleAiChat() {
    const inputField = document.getElementById('ai-user-input');
    const message = inputField.value.trim();
    if (message) {
        runDialogueCompass(message);
        inputField.value = ""; 
    }
}

// 音声入力の開始
function startAiVoiceInput() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert("お使いのブラウザは音声入力に対応していません。");
        return;
    }
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'ja-JP';
    recognition.start();
    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById('ai-user-input').value = transcript;
        handleAiChat(); 
    };
}

</script>
